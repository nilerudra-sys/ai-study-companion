services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL:-claude-3-haiku-20240307}
      - APP_ENV=${APP_ENV:-prod}
    volumes:
      - .:/app:ro

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "8501:8501"
    environment:
      # Use the docker service name so it resolves on the internal network.
      - API_BASE=http://backend:8000/api
    depends_on:
      - backend
    volumes:
      - .:/app:ro
